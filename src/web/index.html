<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ClipSync</title>
  <meta name="theme-color" content="#87CEEB">
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <!-- 顶栏 -->
    <header class="header">
      <span class="logo">🔵 ClipSync</span>
      <div class="header-actions">
        <button class="btn-icon" id="btnClipboardToggle" title="自动同步剪贴板">📋</button>
        <button class="btn-icon" id="btnOpenFolder" title="打开文件夹">📂</button>
        <button class="btn-icon" id="btnQRCode" title="二维码">📱</button>
        <button class="btn-icon" id="btnSettings" title="设置">⚙️<span class="badge" id="pendingBadge" hidden>0</span></button>
      </div>
    </header>

    <!-- 分类标签 -->
    <nav class="tabs">
      <button class="tab active" data-type="all">全部</button>
      <button class="tab" data-type="text">文字</button>
      <button class="tab" data-type="image">图片</button>
      <button class="tab" data-type="file">文件</button>
    </nav>

    <!-- 内容列表 -->
    <main class="content-list" id="contentList">
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <p>暂无同步内容</p>
        <p class="empty-hint">在下方输入文字或拖拽文件开始同步</p>
      </div>
    </main>

    <!-- 输入区 -->
    <footer class="input-area">
      <div class="input-row">
        <button class="btn-attach" id="btnAttach" title="选择文件">📎</button>
        <input type="file" id="fileInput" hidden multiple>
        <textarea
          class="input-text"
          id="inputText"
          placeholder="输入文字或粘贴内容..."
          rows="1"
        ></textarea>
        <button class="btn-send" id="btnSend">发送</button>
      </div>
    </footer>

    <!-- 底部状态栏 -->
    <div class="status-bar">
      <span class="status-indicator" id="serverStatus">⏳ 正在启动服务...</span>
      <span class="device-count" id="deviceCount"></span>
    </div>
  </div>

  <!-- 设备管理面板（从右侧滑入） -->
  <div class="overlay" id="deviceOverlay" hidden></div>
  <div class="device-panel" id="devicePanel" hidden>
    <div class="panel-header">
      <h3>设备管理</h3>
      <button class="btn-close" id="btnClosePanel">✕</button>
    </div>

    <!-- 待审批设备 -->
    <div class="panel-section" id="pendingSection" hidden>
      <h4 class="section-title">⏳ 待审批设备</h4>
      <div id="pendingList"></div>
    </div>

    <!-- 已授权设备 -->
    <div class="panel-section">
      <h4 class="section-title">✅ 已授权设备</h4>
      <div id="authorizedList">
        <p class="panel-hint">暂无已授权设备</p>
      </div>
    </div>

    <!-- 局域网电脑互联 -->
    <div class="panel-section">
      <h4 class="section-title">💻 局域网电脑</h4>
      <div id="peerList">
        <p class="panel-hint">正在发现同网电脑...</p>
      </div>
    </div>

    <!-- 本机信息 -->
    <div class="panel-section">
      <h4 class="section-title">📱 本机信息</h4>
      <div class="local-info">
        <div class="local-name-row">
          <span>设备名称：</span>
          <span id="localName">-</span>
          <button class="btn-edit-name" id="btnEditName" title="修改名称">✎</button>
        </div>
        <div class="local-name-edit" id="localNameEdit" hidden>
          <input type="text" class="input-name" id="inputDeviceName" maxlength="30" placeholder="输入设备名称">
          <button class="btn-save-name" id="btnSaveName">保存</button>
          <button class="btn-cancel-name" id="btnCancelName">取消</button>
        </div>
        <div><span>设备 ID：</span><span id="localId" class="text-mono">-</span></div>
      </div>
    </div>
  </div>

  <!-- 审批弹窗（居中弹出） -->
  <div class="overlay" id="approvalOverlay" hidden></div>
  <div class="approval-dialog" id="approvalDialog" hidden>
    <div class="approval-icon">🔔</div>
    <h3>新设备请求连接</h3>
    <div class="approval-info">
      <div class="approval-row"><span>设备名称</span><span id="reqName">-</span></div>
      <div class="approval-row"><span>设备类型</span><span id="reqPlatform">-</span></div>
      <div class="approval-row"><span>IP 地址</span><span id="reqIP">-</span></div>
    </div>
    <div class="approval-actions">
      <button class="btn-reject" id="btnReject">拒绝</button>
      <button class="btn-approve" id="btnApprove">接受并记住</button>
    </div>
  </div>

  <!-- 二维码弹窗 -->
  <div class="overlay" id="qrOverlay" hidden></div>
  <div class="qr-dialog" id="qrDialog" hidden>
    <div class="qr-header">
      <h3>📱 扫码连接</h3>
      <button class="btn-close" id="btnCloseQR">✕</button>
    </div>
    <div class="qr-body">
      <div class="qr-svg" id="qrSvg"></div>
      <p class="qr-url" id="qrUrl"></p>
      <p class="qr-hint">手机或平板扫描二维码即可打开 ClipSync</p>
    </div>
  </div>

  <script src="js/crypto-client.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ws.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/devices.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
